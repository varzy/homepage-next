name: Scheduled Release

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch content from Notion
        run: pnpm fetch:all
        env:
          NOTION_API_SECRET: ${{ secrets.NOTION_API_SECRET }}
          NOTION_POSTS_DATABASE_ID: ${{ secrets.NOTION_POSTS_DATABASE_ID }}
          NOTION_PAGES_DATABASE_ID: ${{ secrets.NOTION_PAGES_DATABASE_ID }}
          NOTION_KOTOBA_DATABASE_ID: ${{ secrets.NOTION_KOTOBA_DATABASE_ID }}
          NOTION_TASTE_DATABASE_ID: ${{ secrets.NOTION_TASTE_DATABASE_ID }}
          SMMS_API_TOKEN: ${{ secrets.SMMS_API_TOKEN }}

      - name: Run checks
        run: pnpm run exam

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes, skipping commit."
          else
            git commit -m "Release."
            git push
          fi
